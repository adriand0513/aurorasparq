<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Aurora Sparq • Isabella</title>
    <style>
        :root {
            --bg: #0d0015;
            --accent-purple: #c300ff;
            --accent-pink: #ff0099;
            --text: #f8f0ff;
            --text-muted: #bb99cc;
            --input-bg: rgba(50, 20, 80, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        #app {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            flex-shrink: 0;
            padding: 12px 16px;
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        .avatar-container { cursor: pointer; }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid var(--accent-purple);
        }
        #messages-container {
            flex: 1 1 0;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.45;
            word-wrap: break-word;
        }
        .sent {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .received {
            background: rgba(30,20,50,0.9);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(30,20,50,0.9);
            border-radius: 22px;
            align-self: flex-start;
            max-width: 80%;
            font-size: 14px;
            color: var(--text-muted);
            visibility: hidden;
            opacity: 0;
        }
        .typing-indicator.visible { visibility: visible; opacity: 1; }
        .typing-dot {
            width: 8px; height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        .input-area {
            flex-shrink: 0;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #user-input {
            flex: 1;
            padding: 13px 18px;
            border: none;
            border-radius: 30px;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
        }
        #user-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(195,0,255,0.3); }
        #send-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        /* Improved Voice Note */
        .voice-note {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(45, 30, 75, 0.95);
            border-radius: 9999px;
            max-width: 85%;
            align-self: flex-start;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .voice-play-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="avatar-container" onclick="openFullAvatar()">
                <div class="avatar" style="background-image: url('/static/images/isabella.png');"></div>
            </div>
            <div class="contact-info">
                <h2>Isabella</h2>
            </div>
        </div>
    </div>

    <div id="messages-container">
        <div id="typing-indicator" class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <span>Isabella is typing...</span>
        </div>
    </div>

    <div class="input-area">
        <input id="user-input" type="text" placeholder="Message Isabella..." autocomplete="off" />
        <button id="send-btn">➤</button>
    </div>
</div>

<!-- Avatar Modal -->
<div id="avatar-modal" class="avatar-modal">
    <span class="avatar-modal-close" onclick="closeFullAvatar()">×</span>
    <img class="avatar-modal-content" id="full-avatar" src="/static/images/isabella.png" alt="Isabella">
</div>

<script>
    // Variables
    const messagesContainer = document.getElementById('messages-container');
    const typingIndicator = document.getElementById('typing-indicator');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    let convoId = localStorage.getItem('convo_id');
    let messagesHistory = [];
    let isSending = false;

    if (!convoId) {
        convoId = 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        localStorage.setItem('convo_id', convoId);
    }

    function loadHistory() {
        try {
            const saved = localStorage.getItem('messages_history');
            messagesHistory = saved ? JSON.parse(saved) : [];
        } catch (e) {
            messagesHistory = [];
        }
    }

    function saveHistory() {
        localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
    }

    function initChat() {
        loadHistory();
        messagesContainer.innerHTML = '';
        messagesHistory.forEach(msg => {
            if (msg.voice_note) addVoiceNote(msg.voice_note);
            else addMessage(msg.content, msg.role === 'user' ? 'sent' : 'received');
        });
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addVoiceNote(audioUrl) {
        const voiceDiv = document.createElement('div');
        voiceDiv.className = 'voice-note message received';
        voiceDiv.innerHTML = `
            <button class="voice-play-btn">▶</button>
            <div class="voice-duration">0:00</div>`;
        
        const playBtn = voiceDiv.querySelector('.voice-play-btn');
        const durationEl = voiceDiv.querySelector('.voice-duration');
        const audio = new Audio(audioUrl);
        let isPlaying = false;

        audio.addEventListener('timeupdate', () => durationEl.textContent = formatTime(audio.currentTime));
        audio.addEventListener('ended', () => { isPlaying = false; playBtn.textContent = '▶'; });

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause(); playBtn.textContent = '▶';
            } else {
                audio.play(); playBtn.textContent = '❚❚';
            }
            isPlaying = !isPlaying;
        });

        messagesContainer.appendChild(voiceDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec.toString().padStart(2, '0')}`;
    }

    async function sendMessage() {
        if (isSending) return;
        const msg = input.value.trim();
        if (!msg) return;

        isSending = true;
        addMessage(msg, 'sent');
        messagesHistory.push({ role: 'user', content: msg });
        saveHistory();
        input.value = '';

        await triggerBotReply(msg);

        isSending = false;
        input.focus();
    }

    async function triggerBotReply(userMessage = null) {
        if (isSending) return;
        isSending = true;
        typingIndicator.classList.add('visible');

        try {
            const payload = { convo_id: convoId };
            if (userMessage) payload.message = userMessage;

            const res = await fetch('/api/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (!data.replies || data.replies.length === 0) return;

            for (let i = 0; i < data.replies.length; i++) {
                const bubble = data.replies[i];
                const isLast = i === data.replies.length - 1;
                const delay = i === 0 ? 0 : 2800;

                await new Promise(resolve => {
                    setTimeout(() => {
                        if (isLast && data.voice_note) {
                            addVoiceNote(data.voice_note);
                            messagesHistory.push({ role: 'assistant', content: bubble, voice_note: data.voice_note });
                        } else {
                            addMessage(bubble, 'received');
                            messagesHistory.push({ role: 'assistant', content: bubble });
                        }
                        saveHistory();
                        resolve();
                    }, delay);
                });
            }
        } catch (err) {
            console.error('Reply error:', err);
        } finally {
            typingIndicator.classList.remove('visible');
            isSending = false;
        }
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    sendBtn.addEventListener('touchend', sendMessage);

    input.addEventListener('keypress', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    window.addEventListener('load', () => {
        sizeApp();
        initChat();
        input.focus();
    });

    window.addEventListener('resize', sizeApp);

    function sizeApp() {
        document.body.style.height = window.innerHeight + 'px';
    }

    function openFullAvatar() {
        const modal = document.getElementById('avatar-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeFullAvatar() {
        const modal = document.getElementById('avatar-modal');
        modal.classList.remove('show');
        setTimeout(() => modal.style.display = 'none', 300);
    }
</script>
</body>
</html>
