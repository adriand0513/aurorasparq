<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Sparq • Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d0015; color: #f8f0ff; }
        .card { background: rgba(30,20,50,0.95); border: 1px solid #c300ff; }
        .stat-number { font-size: 2.8rem; line-height: 1; }
    </style>
</head>
<body class="p-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-bold">Isabella Analytics</h1>
            <p class="text-sm opacity-60" id="last-updated">Last updated: just now</p>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10" id="kpi-cards">
            <!-- Populated by JS -->
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Archetypes -->
            <div class="card p-6 rounded-3xl">
                <h3 class="text-xl mb-4">Top Archetypes</h3>
                <div id="archetype-list" class="space-y-3"></div>
            </div>

            <!-- Activity Chart -->
            <div class="card p-6 rounded-3xl">
                <h3 class="text-xl mb-4">Message Activity (Last 30min)</h3>
                <canvas id="activityChart" height="200"></canvas>
            </div>
        </div>
    </div>

    <script>
        let activityChart;
        let ws = null;

        function connectWebSocket() {
            const token = prompt("Enter ADMIN_TOKEN:");
            if (!token) return;

            ws = new WebSocket(`wss://${location.host}/ws/analytics?token=${token}`);

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                // Update KPI Cards
                document.getElementById('kpi-cards').innerHTML = `
                    <div class="card p-6 rounded-3xl">
                        <p class="text-sm opacity-70">Active Sessions</p>
                        <p class="stat-number text-pink-400">${data.active_sessions || 0}</p>
                    </div>
                    <div class="card p-6 rounded-3xl">
                        <p class="text-sm opacity-70">Messages / Minute</p>
                        <p class="stat-number text-purple-400">${data.messages_per_minute || 0}</p>
                    </div>
                    <div class="card p-6 rounded-3xl">
                        <p class="text-sm opacity-70">Avg Response</p>
                        <p class="stat-number text-cyan-400">${data.avg_response_time_ms || 0}<span class="text-lg">ms</span></p>
                    </div>
                    <div class="card p-6 rounded-3xl">
                        <p class="text-sm opacity-70">Archetypes</p>
                        <p class="stat-number text-amber-400">${data.total_archetypes_detected || 0}</p>
                    </div>
                `;

                // Update Archetypes
                const list = document.getElementById('archetype-list');
                list.innerHTML = '';
                const arches = data.top_archetypes || {};
                if (Object.keys(arches).length === 0) {
                    list.innerHTML = `<p class="opacity-50">Waiting for conversations...</p>`;
                } else {
                    Object.entries(arches).forEach(([name, count]) => {
                        list.innerHTML += `
                            <div class="flex justify-between items-center bg-black/30 p-4 rounded-2xl">
                                <span class="capitalize">${name.replace('_', ' ')}</span>
                                <span class="font-bold text-purple-400">${count}</span>
                            </div>
                        `;
                    });
                }
            };
        }

        window.onload = () => {
            connectWebSocket();
        };
    </script>
</body>
</html>
