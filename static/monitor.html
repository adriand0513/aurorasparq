<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella • Live Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0012; color: #f8f0ff; }
        .chat-box { background: rgba(30,20,50,0.95); border: 1px solid #c300ff; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-6">Aurora Sparq Live Monitor</h1>
        
        <div class="flex gap-4 mb-6">
            <button onclick="connectMonitor()" class="bg-purple-600 px-6 py-2 rounded-xl">Connect Live Monitor</button>
        </div>

        <div id="live-chats" class="space-y-6"></div>
    </div>

    <script>
        let ws = null;

        function connectMonitor() {
            const token = prompt("Enter ADMIN_TOKEN:");
            if (!token) return;

            ws = new WebSocket(`wss://${location.host}/ws/monitor?token=${token}`);

            ws.onopen = () => console.log("✅ Monitor connected");
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                renderChat(data);
            };
        }

        function renderChat(data) {
            const container = document.getElementById('live-chats');
            // This will be expanded once backend is ready
            console.log("Received chat data:", data);
        }
    </script>
</body>
</html>
