<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upgrade Successful • Aurora Sparq</title>
    <style>
        :root {
            --bg: #0d0015;
            --accent: #c300ff;
            --accent2: #ff0099;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: #f8f0ff;
            font-family: system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .success-container {
            text-align: center;
            max-width: 480px;
            padding: 40px 30px;
            background: rgba(30,20,50,0.95);
            border-radius: 28px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 60px rgba(195, 0, 255, 0.3);
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pop 0.6s ease;
        }
        h1 {
            font-size: 2.4rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s;
            margin: 10px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(195, 0, 255, 0.6);
        }
        .redirect-text {
            margin-top: 30px;
            font-size: 0.95rem;
            opacity: 0.7;
        }
        @keyframes pop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✨</div>
        <h1>Upgrade Successful!</h1>
        <p>Welcome to a whole new level with Isabella 💕<br>
           Your account has been upgraded. Enjoy unlimited access.</p>
        
        <a href="/chat" class="btn">Continue to Isabella</a>
        
        <div class="redirect-text">Redirecting you in <span id="countdown">5</span> seconds...</div>
    </div>

    <script>
        let timeLeft = 5;
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = '/chat';
            }
        }, 1000);
    </script>
</body>
</html>
