<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Sparq • Isabella</title>
    <style>
        :root {
            --bg: #0d0015;
            --accent: #c300ff;
            --accent2: #ff0099;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: #f8f0ff;
            font-family: system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 16px;
            background: rgba(20,5,40,0.95);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(195,0,255,0.3);
        }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: url('/static/images/isabella.png') center/cover;
            border: 2px solid var(--accent);
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.45;
        }
        .sent { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; align-self: flex-end; }
        .received { background: rgba(30,20,50,0.95); align-self: flex-start; }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(30,20,50,0.9);
            border-radius: 22px;
            align-self: flex-start;
            visibility: hidden;
        }
        .typing-indicator.visible { visibility: visible; }
        .input-area {
            padding: 12px 16px;
            background: rgba(20,5,40,0.95);
            display: flex;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 30px;
            background: rgba(50,20,80,0.7);
            color: white;
            font-size: 16px;
        }
        #send-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="avatar"></div>
    <h2>Isabella</h2>
</div>

<div id="messages"></div>

<div class="input-area">
    <input id="user-input" placeholder="Message Isabella..." autocomplete="off" />
    <button id="send-btn">➤</button>
</div>

<script>
    const messagesContainer = document.getElementById('messages');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    let convoId = localStorage.getItem('convo_id') || 'conv_' + Date.now();
    localStorage.setItem('convo_id', convoId);

    let messagesHistory = [];
    let isSending = false;
    let userTypingTimeout = null;
    const USER_TYPING_DELAY = 4500;

    const typingIndicator = document.createElement('div');
    typingIndicator.className = 'typing-indicator';
    typingIndicator.innerHTML = `
        <div style="width:8px;height:8px;background:#bb99cc;border-radius:50%;animation:typing 1.4s infinite"></div>
        <div style="width:8px;height:8px;background:#bb99cc;border-radius:50%;animation:typing 1.4s infinite 0.2s"></div>
        <div style="width:8px;height:8px;background:#bb99cc;border-radius:50%;animation:typing 1.4s infinite 0.4s"></div>
        <span>Isabella is typing...</span>`;
    typingIndicator.style.visibility = 'hidden';
    messagesContainer.appendChild(typingIndicator);

    function loadHistory() {
        try {
            const saved = localStorage.getItem('messages_history');
            messagesHistory = saved ? JSON.parse(saved) : [];
        } catch (e) {
            messagesHistory = [];
        }
    }

    function saveHistory() {
        localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        messagesContainer.appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showTyping() {
        typingIndicator.style.visibility = 'visible';
        scrollToBottom();
    }

    function hideTyping() {
        typingIndicator.style.visibility = 'hidden';
    }

    // 60 words per minute
    function getTypingDuration(text) {
        const wordCount = text.trim().split(/\s+/).length;
        const baseTime = wordCount * 1000;           // 1 second per word
        return Math.max(1200, Math.min(baseTime, 10000)); // 1.2s ~ 10s
    }

    async function sendToBackend(msg) {
        if (isSending) return;
        isSending = true;

        try {
            const res = await fetch('/api/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ convo_id: convoId, message: msg })
            });

            const data = await res.json();

            if (data.replies && data.replies.length > 0) {
                for (let i = 0; i < data.replies.length; i++) {
                    const bubble = data.replies[i];
                    showTyping();
                    await new Promise(resolve => {
                        setTimeout(() => {
                            hideTyping();
                            addMessage(bubble, 'received');
                            messagesHistory.push({ role: 'assistant', content: bubble });
                            saveHistory();
                            resolve();
                        }, getTypingDuration(bubble));
                    });
                }
            }
        } catch (err) {
            console.error(err);
            hideTyping();
        } finally {
            isSending = false;
        }
    }

    function handleUserInput() {
        if (userTypingTimeout) clearTimeout(userTypingTimeout);
        userTypingTimeout = setTimeout(() => {
            const msg = input.value.trim();
            if (msg && !isSending) {
                addMessage(msg, 'sent');
                messagesHistory.push({ role: 'user', content: msg });
                saveHistory();
                input.value = '';
                sendToBackend(msg);
            }
        }, USER_TYPING_DELAY);
    }

    input.addEventListener('input', handleUserInput);

    input.addEventListener('keypress', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const msg = input.value.trim();
            if (msg) {
                if (userTypingTimeout) clearTimeout(userTypingTimeout);
                addMessage(msg, 'sent');
                messagesHistory.push({ role: 'user', content: msg });
                saveHistory();
                input.value = '';
                sendToBackend(msg);
            }
        }
    });

    sendBtn.addEventListener('click', () => {
        const msg = input.value.trim();
        if (msg) {
            if (userTypingTimeout) clearTimeout(userTypingTimeout);
            addMessage(msg, 'sent');
            messagesHistory.push({ role: 'user', content: msg });
            saveHistory();
            input.value = '';
            sendToBackend(msg);
        }
    });

    window.addEventListener('load', () => {
        loadHistory();
        messagesContainer.innerHTML = '';
        messagesHistory.forEach(m => {
            addMessage(m.content, m.role === 'user' ? 'sent' : 'received');
        });
        scrollToBottom();
    });
</script>
</body>
</html>
