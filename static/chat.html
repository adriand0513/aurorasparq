<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Sparq • Isabella</title>
    <style>
        :root {
            --bg: #0d0015;
            --accent: #c300ff;
            --accent2: #ff0099;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: #f8f0ff;
            font-family: system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 16px;
            background: rgba(20,5,40,0.95);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(195,0,255,0.3);
            flex-shrink: 0;
        }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: url('/static/images/isabella.png') center/cover;
            border: 2px solid var(--accent);
        }

        #auth-screen, #chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #auth-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-card {
            background: rgba(30,20,50,0.95);
            padding: 32px;
            border-radius: 24px;
            border: 1px solid var(--accent);
            width: 100%;
            max-width: 380px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            background: rgba(50,20,80,0.7);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
        }

        #chat-wrapper { min-height: 0; }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.45;
        }
        .sent { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; align-self: flex-end; }
        .received { background: rgba(30,20,50,0.95); align-self: flex-start; }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(30,20,50,0.9);
            border-radius: 22px;
            width: fit-content;
        }
        .typing-dot {
            width: 8px; height: 8px;
            background: #bb99cc;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        #offline-message {
            padding: 20px;
            text-align: center;
            background: rgba(30,20,50,0.95);
            margin: 10px;
            border-radius: 16px;
            border: 1px solid var(--accent);
            display: none;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: rgba(30,20,50,0.98);
            padding: 32px;
            border-radius: 24px;
            border: 2px solid var(--accent);
            max-width: 420px;
            width: 90%;
            text-align: center;
        }

        .loading-dots {
            display: inline-block;
            animation: loadingDots 1.2s infinite;
        }
        
        @keyframes loadingDots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        @keyframes popIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen">
        <div class="auth-card">
            <h2 class="text-center text-2xl mb-6">Welcome to Aurora Sparq</h2>
            
            <div id="login-form">
                <input id="login-email" type="email" placeholder="Email" />
                <input id="login-password" type="password" placeholder="Password" />
                <button class="btn-primary" onclick="login()">Login</button>
                <p class="text-center text-sm mt-4">
                    No account? <span onclick="showRegister()" style="color:var(--accent); cursor:pointer;">Register</span>
                </p>
            </div>

            <div id="register-form" style="display:none;">
                <input id="reg-fullname" type="text" placeholder="Full Name" />
                <input id="reg-email" type="email" placeholder="Email" />
                <input id="reg-password" type="password" placeholder="Password" />
                <button class="btn-primary" onclick="register()">Create Account</button>
                <p class="text-center text-sm mt-4">
                    Already have an account? <span onclick="showLogin()" style="color:var(--accent); cursor:pointer;">Login</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-wrapper" style="display: none;">
        <div class="header">
            <div class="avatar"></div>
            <h2>Isabella</h2>
            
            <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
                <div id="user-info"></div>
                
                <!-- Usage Counter -->
                <div id="usage-counter" 
                     style="font-size:0.85rem; padding:6px 12px; border-radius:20px; background:rgba(195,0,255,0.15); border:1px solid var(--accent); color:#f8f0ff;">
                    <!-- Populated by JS -->
                </div>
                
                <div id="subscription-status" style="display:none; font-size:0.85rem; padding:6px 12px; border-radius:20px; background:rgba(195,0,255,0.2); border:1px solid var(--accent); cursor:pointer;" onclick="showPricingModal()">
                    <span id="current-tier"></span>
                </div>
                
                <button onclick="showPricingModal()" 
                        style="padding:8px 16px; font-size:0.9rem; background:linear-gradient(135deg, #c300ff, #ff0099); border:none; border-radius:20px; color:white; cursor:pointer;">
                    Upgrade
                </button>

                <button onclick="logout()" 
                        style="padding:6px 12px; font-size:0.85rem; background:rgba(255,100,100,0.2); border:1px solid #ff6464; border-radius:20px; color:white; cursor:pointer;">
                    Log Out
                </button>
            </div>
        </div>
        
        <div id="messages"></div>

        <div id="offline-message">
            <h3>🌙 Isabella is Offline</h3>
            <p>Only available between <strong>5:00 PM - 2:00 AM ET</strong></p>
            <p style="margin-top: 8px; opacity: 0.8;">Come back during those hours ✨</p>
        </div>

        <div id="typing-container" style="display:none; padding:8px 16px;">
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <span>Isabella is typing...</span>
            </div>
        </div>

        <div class="input-area" style="padding:12px 16px; display:flex; gap:10px;">
            <input id="user-input" placeholder="Message Isabella..." autocomplete="off" />
            <button id="send-btn" style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;font-size:20px;cursor:pointer;">➤</button>
        </div>
    </div>

    <!-- Pricing Modal -->
    <div id="pricing-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: #1a0033; padding: 40px 30px; border-radius: 24px; border: 3px solid #c300ff; max-width: 420px; text-align: center; box-shadow: 0 0 60px rgba(195,0,255,0.6);">
            <h2 style="color: #c300ff; margin-bottom: 30px;">Choose Your Experience</h2>
           
            <button onclick="upgradePlan('premium_monthly')"
                    style="width: 100%; padding: 20px; margin: 12px 0; background: #6b00b3; border: none; border-radius: 16px; color: white; font-size: 1.15rem; cursor: pointer;">
                <strong>Premium — $14.99/mo</strong><br>
                <small style="opacity: 0.9;">Unlimited messages • Voice Notes • Better Memory</small>
            </button>
           
            <button onclick="hidePricingModal()"
                    style="margin-top: 25px; background: transparent; border: 1px solid #666; color: #ccc; padding: 12px 50px; border-radius: 50px; cursor: pointer;">
                Maybe Later
            </button>
        </div>
    </div>
   <script>
        let token = localStorage.getItem('token');
        let currentUser = null;
        let convoId = null;
   
        const messagesContainer = document.getElementById('messages');
        const typingContainer = document.getElementById('typing-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const authScreen = document.getElementById('auth-screen');
        const chatWrapper = document.getElementById('chat-wrapper');
        const userInfo = document.getElementById('user-info');
        const offlineMessage = document.getElementById('offline-message');
    
        let isSending = false;

        // ==================== AVAILABILITY (DISABLED FOR TESTING) ====================
        function isIsabellaAvailable() {
            return true;
        }

        function updateAvailability() {
            offlineMessage.style.display = 'none';
            chatWrapper.style.opacity = '1';
            if (input) input.disabled = false;
            if (sendBtn) sendBtn.disabled = false;
        }

        // ==================== AUTH ====================
        async function authFetch(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: {
                    ...(options.headers || {}),
                    'Authorization': `Bearer ${token}`
                }
            });
    
            if (res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                alert("Your session has expired. Please log in again.");
                window.location.reload();
                return null;
            }
    
            return res;
        }
   
        function showLogin() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }

        async function register() {
            const fullName = document.getElementById('reg-fullname').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
        
            if (!email || !password) return alert("Email and password required");
        
            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name: fullName })
                });
        
                const data = await res.json();
        
                if (res.ok) {
                    // Hide the forms
                    document.getElementById('register-form').style.display = 'none';
                    document.getElementById('login-form').style.display = 'none';
        
                    const authCard = document.querySelector('.auth-card');
        
                    // STEP 1: Show success animation
                    authCard.innerHTML = `
                        <div style="text-align: center; padding: 30px 10px;">
                            <div style="font-size: 60px; margin-bottom: 15px; animation: popIn 0.4s ease;">✅</div>
                            <h2 style="color:#c300ff; margin-bottom:10px; font-size:1.6rem;">Account Created!</h2>
                            <p style="color:#e0d4ff; font-size:1.05rem;">You're all set, ${fullName.split(" ")[0]}.</p>
                        </div>
                    `;
        
                    // STEP 2: After 1.4 seconds, show the Premium offer screen
                    setTimeout(() => {
                        authCard.innerHTML = `
                            <div style="text-align: center; padding: 10px 0;">
                                <h2 style="color:#c300ff; margin-bottom:12px; font-size:1.85rem;">Welcome, ${fullName.split(" ")[0]}!</h2>
                                
                                <p style="margin-bottom:24px; line-height:1.6; color:#e0d4ff; font-size:1.05rem;">
                                    Want the <strong>best experience</strong> with Isabella?
                                </p>
        
                                <!-- Premium Benefits Box -->
                                <div style="background: rgba(107, 0, 179, 0.12); border: 1px solid #6b00b3; border-radius: 16px; padding: 18px 20px; margin-bottom: 26px; text-align: left;">
                                    <div style="color:#c300ff; font-weight:600; margin-bottom:10px; font-size:1rem;">Premium includes:</div>
                                    <ul style="margin:0; padding-left:18px; color:#e0d4ff; line-height:1.75; font-size:0.95rem;">
                                        <li>Unlimited messages with Isabella</li>
                                        <li>Voice notes from her</li>
                                        <li>Smarter memory &amp; better conversations</li>
                                        <li>Priority access</li>
                                    </ul>
                                </div>
        
                                <!-- Upgrade Button -->
                                <button id="upgrade-btn"
                                        style="width:100%; padding:18px 20px; background: linear-gradient(135deg, #6b00b3, #c300ff); border:none; border-radius:16px; color:white; font-size:1.1rem; font-weight:600; margin-bottom:14px; cursor:pointer; box-shadow: 0 4px 20px rgba(195, 0, 255, 0.5); transition: all 0.2s ease;">
                                    Yes, Upgrade to Premium — $14.99/mo
                                </button>
                                
                                <!-- Skip Button -->
                                <button id="skip-btn"
                                        style="width:100%; padding:13px 20px; background:transparent; border:1px solid #555; color:#aaa; border-radius:50px; cursor:pointer; font-size:0.95rem; transition: all 0.2s ease;">
                                    No thanks, continue with Free
                                </button>
                            </div>
                        `;
        
                        const upgradeBtn = document.getElementById('upgrade-btn');
                        const skipBtn = document.getElementById('skip-btn');
        
                        // Click handlers with loading states
                        upgradeBtn.onclick = async () => {
                            upgradeBtn.disabled = true;
                            upgradeBtn.style.opacity = '0.7';
                            upgradeBtn.innerHTML = 'Processing... Please wait';
                            await upgradeAfterRegister(email, password);
                        };
        
                        skipBtn.onclick = () => {
                            skipBtn.disabled = true;
                            skipBtn.style.opacity = '0.6';
                            skipBtn.innerHTML = 'Continuing with Free...';
                            setTimeout(() => {
                                showLoginAfterRegister();
                            }, 500);
                        };
        
                        // Hover effects
                        upgradeBtn.onmouseover = () => {
                            if (!upgradeBtn.disabled) {
                                upgradeBtn.style.transform = 'translateY(-2px)';
                                upgradeBtn.style.boxShadow = '0 6px 25px rgba(195, 0, 255, 0.6)';
                            }
                        };
                        upgradeBtn.onmouseout = () => {
                            if (!upgradeBtn.disabled) {
                                upgradeBtn.style.transform = 'translateY(0)';
                                upgradeBtn.style.boxShadow = '0 4px 20px rgba(195, 0, 255, 0.5)';
                            }
                        };
        
                        skipBtn.onmouseover = () => {
                            if (!skipBtn.disabled) {
                                skipBtn.style.borderColor = '#888';
                                skipBtn.style.color = '#ccc';
                            }
                        };
                        skipBtn.onmouseout = () => {
                            if (!skipBtn.disabled) {
                                skipBtn.style.borderColor = '#555';
                                skipBtn.style.color = '#aaa';
                            }
                        };
        
                    }, 1400); // Show success animation for 1.4 seconds
        
                } else {
                    alert(data.detail || "Registration failed");
                }
            } catch(e) {
                alert("Error during registration");
            }
        }
        
        // Auto-login + Upgrade to Premium
        async function upgradeAfterRegister(email, password) {
            const upgradeBtn = document.getElementById('upgrade-btn');
            
            // Show loading state
            if (upgradeBtn) {
                upgradeBtn.disabled = true;
                upgradeBtn.style.opacity = '0.7';
                upgradeBtn.innerHTML = 'Processing... Please wait';
            }
        
            try {
                // Step 1: Auto login
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);
        
                const loginRes = await fetch('/auth/login', {
                    method: 'POST',
                    body: formData
                });
        
                const loginData = await loginRes.json();
        
                if (!loginRes.ok) {
                    alert("Something went wrong during auto-login. Please try logging in manually.");
                    showLogin();
                    return;
                }
        
                // Step 2: Save token and user data
                token = loginData.access_token;
                currentUser = loginData.user;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(currentUser));
        
                // Step 3: Trigger Stripe checkout
                await upgradePlan('premium_monthly');
        
            } catch (error) {
                console.error(error);
                alert("Something went wrong. Please try logging in and upgrading manually.");
                showLogin();
            }
        }
        
        function showLoginAfterRegister() {
            showLogin();
            alert("Account created! You can upgrade to Premium anytime from the Upgrade button.");
        }

        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
       
            if (!email || !password) {
                alert("Please enter email and password");
                return;
            }
    
            try {
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);
           
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    body: formData
                });
           
                const data = await res.json();
           
                if (res.ok) {
                    token = data.access_token;
                    currentUser = data.user;
               
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(currentUser));
               
                    authScreen.style.display = 'none';
                    chatWrapper.style.display = 'flex';
               
                    userInfo.textContent = `Hi, ${currentUser.full_name || currentUser.email}`;
               
                    await updateSubscriptionDisplay();
                    await loadUserHistory();
                    updateAvailability();
                    await updateUsageCounter();
                    refreshUserData();
                } else {
                    alert(data.detail || "Login failed. Please check your credentials.");
                }
            } catch(e) {
                console.error("Login error:", e);
                alert("Login error. Please try again.");
            }
        }
    
        async function refreshUserData() {
            if (!token) return;
            try {
                const res = await authFetch('/auth/me');
                if (!res) return;
    
                const freshUser = await res.json();
                currentUser = freshUser;
                localStorage.setItem('user', JSON.stringify(freshUser));
                await updateSubscriptionDisplay();
                console.log("✅ User data refreshed - New Tier:", freshUser.subscription_tier);
            } catch(e) {
                console.error("Failed to refresh user data");
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
        }

        // ==================== CHAT CORE ====================
        async function loadUserHistory() {
            if (!token) return;
            try {
                const res = await authFetch('/api/history');
                if (!res) return;
    
                const data = await res.json();
                convoId = data.convo_id || `user_${currentUser.id}`;
                localStorage.setItem('convo_id', convoId);
                messagesContainer.innerHTML = '';
    
                if (data.messages) {
                    data.messages.forEach(m => {
                        const type = m.role === 'user' ? 'sent' : 'received';
                        addMessage(m.content, type);
                    });
                }
                scrollToBottom();
            } catch(e) {
                console.error("Failed to load history", e);
                convoId = `user_${currentUser.id}_${Date.now()}`;
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTyping() {
            typingContainer.style.display = 'block';
            scrollToBottom();
        }

        function hideTyping() {
            typingContainer.style.display = 'none';
        }

        function playVoiceNote(voiceUrl) {
            const audio = new Audio(voiceUrl);
        
            if (typingContainer) {
                typingContainer.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px; padding:8px 12px;
                                background:rgba(195,0,255,0.1); border-radius:12px; width:fit-content;">
                        <span style="font-size:13px; color:#c300ff;">🔊 Isabella is speaking...</span>
                    </div>
                `;
                typingContainer.style.display = 'block';
            }
            audio.play().catch(err => {
                console.error("Audio playback failed:", err);
            });
            audio.onended = () => {
                if (typingContainer) {
                    typingContainer.style.display = 'none';
                    typingContainer.innerHTML = '';
                }
            };
        }

        async function sendToBackend(msg) {
            isSending = true;
            showTyping();
       
            try {
                const res = await fetch('/api/reply', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        convo_id: convoId,
                        message: msg
                    })
                });
       
                const data = await res.json();
       
                // Send text replies normally
                if (data.replies && Array.isArray(data.replies)) {
                    data.replies.forEach(bubble => {
                        if (bubble) addMessage(bubble, 'received');
                    });
                }
       
                // Send voice note as its own separate message
                if (data.voice_message && data.voice_message.voice_url) {
                    addVoiceMessageOnly(data.voice_message.voice_url);
                } 
                // Fallback support for old response format
                else if (data.voice_url) {
                    addVoiceMessageOnly(data.voice_url);
                }
       
            } catch (err) {
                console.error("SendToBackend error:", err);
            } finally {
                hideTyping();
                isSending = false;
                await updateUsageCounter();
            }
        }
      
        function addVoiceMessageOnly(voiceUrl) {
            const div = document.createElement('div');
            div.className = `message received voice-only`;
           
            div.innerHTML = `
                <audio controls style="width: 100%; max-width: 260px; height: 32px;">
                    <source src="${voiceUrl}" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            `;
           
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        function sendMessage() {
            const msg = input.value.trim();
            if (!msg || isSending) return;
            addMessage(msg, 'sent');
            input.value = '';
            sendToBackend(msg);
        }

        // ==================== PAYMENTS & USAGE ====================
        function showPricingModal() {
            document.getElementById('pricing-modal').style.display = 'flex';
        }

        function hidePricingModal() {
            document.getElementById('pricing-modal').style.display = 'none';
        }

        async function upgradePlan(priceType) {
            if (!token) {
                alert("Please login first");
                return;
            }
            try {
                const res = await authFetch('/payments/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ price_type: priceType })
                });
    
                if (!res) return;
    
                const data = await res.json();
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    alert(data.detail || "Payment error");
                }
            } catch (error) {
                alert("Payment error. Please try again.");
            }
        }

        async function updateSubscriptionDisplay() {
            if (!currentUser) return;
         
            const statusEl = document.getElementById('subscription-status');
            const tierEl = document.getElementById('current-tier');
            const counterEl = document.getElementById('usage-counter');
         
            const tier = (currentUser.subscription_tier || 'free').toLowerCase();
         
            if (tier === 'premium') {
                tierEl.textContent = "PREMIUM Plan";
                if (counterEl) counterEl.style.display = 'none';
            } else {
                tierEl.textContent = 'Free Plan';
                if (counterEl) counterEl.style.display = 'block';
            }
         
            statusEl.style.display = 'block';
        }
       
        async function updateUsageCounter() {
            const counterEl = document.getElementById('usage-counter');
            if (!counterEl || !currentUser || !token) return;
       
            try {
                const res = await authFetch('/api/usage');
                if (!res) return;
       
                if (!res.ok) {
                    counterEl.innerHTML = '—';
                    return;
                }
       
                const data = await res.json();
                const tier = (currentUser.subscription_tier || 'free').toLowerCase();
       
                if (tier === 'premium') {
                    counterEl.innerHTML = 'Unlimited ✨';
                    counterEl.style.background = 'rgba(0, 200, 100, 0.15)';
                    counterEl.style.border = '1px solid #00c864';
                } else {
                    const remaining = Math.max(0, 10 - (data.daily_count || 0));
                    counterEl.innerHTML = `${remaining} / 10 today`;
       
                    if (remaining < 5) {
                        counterEl.style.background = 'rgba(255, 100, 100, 0.2)';
                        counterEl.style.border = '1px solid #ff6464';
                    } else {
                        counterEl.style.background = 'rgba(195,0,255,0.15)';
                        counterEl.style.border = '1px solid var(--accent)';
                    }
                }
            } catch (e) {
                counterEl.innerHTML = '—';
            }
        }
        
        // ==================== INIT ====================
        window.addEventListener('load', () => {
            if (token) {
                currentUser = JSON.parse(localStorage.getItem('user') || '{}');
                authScreen.style.display = 'none';
                chatWrapper.style.display = 'flex';
                userInfo.textContent = `Hi, ${currentUser.full_name || currentUser.email || 'User'}`;
            
                loadUserHistory();
                updateSubscriptionDisplay();
                updateUsageCounter();
                refreshUserData();
            }
            updateAvailability();
        });

        // ==================== EVENT LISTENERS ====================
        if (input) {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        if (sendBtn) {
            sendBtn.addEventListener('click', sendMessage);
        }
    </script>
</body>
</html>
