<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Aurora Sparq</title>
    <style>
        :root {
            --bg: #0d0015;
            --accent-purple: #c300ff;
            --accent-pink: #ff0099;
            --accent-glow: rgba(195, 0, 255, 0.4);
            --danger: #ff3366;
            --text: #f8f0ff;
            --text-muted: #bb99cc;
            --input-bg: rgba(50, 20, 80, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        #app {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
        }
        .chat-header {
            flex-shrink: 0;
            padding: 12px 16px;
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background-size: cover; border: 2px solid var(--accent-purple); cursor: pointer; }
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(to bottom, rgba(13,0,21,0.6), transparent);
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.45;
        }
        .sent { background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; align-self: flex-end; }
        .received { background: rgba(30,20,50,0.9); color: white; align-self: flex-start; }
        .typing-indicator {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 16px;
            background: rgba(30,20,50,0.9);
            border-radius: 22px;
            align-self: flex-start;
            max-width: 80%;
            visibility: hidden; opacity: 0;
        }
        .typing-indicator.visible { visibility: visible; opacity: 1; }
        .input-area {
            flex-shrink: 0;
            padding: 12px 16px;
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            display: flex;
            gap: 12px;
        }
        #user-input {
            flex: 1;
            padding: 13px 18px;
            border: none;
            border-radius: 30px;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
        }
        #send-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            cursor: pointer;
        }
        .voice-note {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px;
            background: rgba(45,30,75,0.95);
            border-radius: 9999px;
            max-width: 78%;
            align-self: flex-start;
        }
        .voice-play-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-purple); color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="avatar" style="background-image: url('/static/images/isabella.png');" onclick="openFullAvatar()"></div>
                <h2>Isabella</h2>
            </div>
            <button onclick="clearConversation()">Clear Chat</button>
        </div>

        <div id="messages-container"></div>

        <div class="input-area">
            <input id="user-input" type="text" placeholder="Message Isabella..." autocomplete="off" />
            <button id="send-btn">➤</button>
        </div>
    </div>

    <!-- Avatar Modal -->
    <div id="avatar-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; align-items:center; justify-content:center;">
        <span onclick="closeFullAvatar()" style="position:absolute; top:30px; right:40px; color:white; font-size:60px; cursor:pointer;">×</span>
        <img id="full-avatar" src="/static/images/isabella.png" style="max-width:90vw; max-height:90vh; border-radius:16px;">
    </div>

   <script>
        // === AGGRESSIVE CACHE BUSTING ===
        if (!window.location.search.includes('v=')) {
            window.location.replace(window.location.pathname + '?v=' + Date.now());
        }
    
        // === NATURAL NAME SYSTEM ===
        let userId = localStorage.getItem('user_id') || 'user_' + Math.random().toString(36).substr(2, 9);
        if (!localStorage.getItem('user_id')) localStorage.setItem('user_id', userId);
    
        // === SAFARI VIEWPORT + SCROLL FIX ===
        function sizeApp() {
            const h = window.innerHeight;
            document.documentElement.style.setProperty('--vh', `${h * 0.01}px`);
            document.body.style.height = h + 'px';
        }
    
        function forceScrollFix() {
            const messages = document.getElementById('messages-container');
            if (messages) {
                messages.style.minHeight = 'auto';
                void messages.offsetHeight;
                messages.style.minHeight = '';
            }
        }
    
        // Main variables
        const messagesContainer = document.getElementById('messages-container');
        const typingIndicator = document.getElementById('typing-indicator');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
    
        let messagesHistory = [];
        let userIdleTimeout = null;
        let isSending = false;
        const USER_IDLE_PAUSE = 4000;
    
        function loadHistory() {
            try {
                const saved = localStorage.getItem('messages_history');
                messagesHistory = saved ? JSON.parse(saved) : [];
            } catch (e) {
                messagesHistory = [];
            }
        }
    
        function saveHistory() {
            try {
                localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
            } catch (e) {}
        }
    
        function initChat() {
            loadHistory();
            messagesContainer.innerHTML = '';
    
            messagesHistory.forEach(msg => {
                if (msg.voice_note) {
                    addVoiceNote(msg.voice_note);
                } else {
                    const type = msg.role === 'user' ? 'sent' : 'received';
                    addMessage(msg.content, type);
                }
            });
    
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    
        function addVoiceNote(audioUrl) {
            const voiceDiv = document.createElement('div');
            voiceDiv.className = 'voice-note message received';
            voiceDiv.innerHTML = `
                <button class="voice-play-btn">▶</button>
                <div class="voice-waveform">
                    <div class="voice-bar" style="height:18px"></div>
                    <div class="voice-bar" style="height:26px"></div>
                    <div class="voice-bar" style="height:14px"></div>
                    <div class="voice-bar" style="height:30px"></div>
                    <div class="voice-bar" style="height:22px"></div>
                    <div class="voice-bar" style="height:16px"></div>
                    <div class="voice-bar" style="height:28px"></div>
                    <div class="voice-bar" style="height:20px"></div>
                </div>
                <div class="voice-duration">0:00</div>`;
    
            const playBtn = voiceDiv.querySelector('.voice-play-btn');
            const durationEl = voiceDiv.querySelector('.voice-duration');
            const audio = new Audio(audioUrl);
            let isPlaying = false;
    
            audio.addEventListener('timeupdate', () => {
                durationEl.textContent = formatTime(audio.currentTime);
            });
            audio.addEventListener('ended', () => {
                isPlaying = false;
                playBtn.textContent = '▶';
            });
    
            playBtn.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    playBtn.textContent = '▶';
                } else {
                    audio.play();
                    playBtn.textContent = '❚❚';
                }
                isPlaying = !isPlaying;
            });
    
            messagesContainer.appendChild(voiceDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }
    
        async function sendMessage() {
            if (isSending) return;
            const msg = input.value.trim();
            if (!msg) return;
    
            isSending = true;
            addMessage(msg, 'sent');
            messagesHistory.push({ role: 'user', content: msg });
            saveHistory();
            input.value = '';
    
            if (userIdleTimeout) clearTimeout(userIdleTimeout);
            userIdleTimeout = setTimeout(() => triggerBotReply(), USER_IDLE_PAUSE);
    
            input.focus();
            setTimeout(() => isSending = false, 1500);
        }
    
        async function triggerBotReply() {
            if (isSending) return;
            isSending = true;
            typingIndicator.classList.add('visible');
    
            try {
                const res = await fetch('/api/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
    
                const data = await res.json();
    
                if (!data.replies || data.replies.length === 0) {
                    typingIndicator.classList.remove('visible');
                    isSending = false;
                    return;
                }
    
                for (let i = 0; i < data.replies.length; i++) {
                    const bubble = data.replies[i];
                    const isLast = i === data.replies.length - 1;
                    const delay = i === 0 ? 0 : 2800;
    
                    await new Promise(resolve => {
                        setTimeout(() => {
                            if (isLast && data.voice_note) {
                                messagesHistory.push({ role: 'assistant', content: bubble, voice_note: data.voice_note });
                                addVoiceNote(data.voice_note);
                            } else {
                                addMessage(bubble, 'received');
                                messagesHistory.push({ role: 'assistant', content: bubble });
                            }
                            saveHistory();
                            resolve();
                        }, delay);
                    });
                }
            } catch (err) {
                console.error('Reply error:', err);
            } finally {
                typingIndicator.classList.remove('visible');
                isSending = false;
            }
        }
    
        function handleSend(e) {
            if (e) {
                e.preventDefault();
                e.stopImmediatePropagation();
            }
            sendMessage();
        }
    
        // Event Listeners
        sendBtn.addEventListener('click', handleSend);
        sendBtn.addEventListener('touchend', handleSend);
    
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend(e);
            }
        });
    
        input.addEventListener('focus', () => {
            setTimeout(() => {
                sizeApp();
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 300);
        });
    
        window.addEventListener('load', () => {
            sizeApp();
            initChat();
            forceScrollFix();
        });
    
        window.addEventListener('resize', () => {
            sizeApp();
            forceScrollFix();
        });
    
        function openFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }
    
        function closeFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }
    
        window.onclick = function(event) {
            const modal = document.getElementById('avatar-modal');
            if (event.target === modal) closeFullAvatar();
        };
    
        function clearConversation() {
            if (confirm("Clear this conversation?")) {
                localStorage.removeItem('messages_history');
                messagesHistory = [];
                messagesContainer.innerHTML = '';
            }
        }
    </script>
</body>
</html>
