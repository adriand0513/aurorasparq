<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella • Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d0015; color: #f8f0ff; }
        .card { background: rgba(30,20,50,0.95); border: 1px solid #c300ff; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-center">Isabella Analytics</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="live-stats">
            <!-- Populated by JS -->
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card p-6 rounded-3xl">
                <h3 class="mb-4">Top Archetypes</h3>
                <div id="archetype-list" class="space-y-3 min-h-[200px]"></div>
            </div>
            
            <div class="card p-6 rounded-3xl">
                <h3 class="mb-4">Live Activity</h3>
                <canvas id="activityChart" height="180"></canvas>
            </div>
        </div>
    </div>

    <script>
        let activityChart;
        let ws = null;

        function connectWebSocket() {
            const token = prompt("Enter your ADMIN_TOKEN to access dashboard:");
            if (!token) return;

            ws = new WebSocket(`wss://${location.host}/ws/analytics?token=${token}`);

            ws.onopen = () => console.log("✅ Connected to analytics");
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                // Update Live Stats
                document.getElementById('live-stats').innerHTML = `
                    <div class="card p-6 rounded-3xl">
                        <h4 class="opacity-75 text-sm">Active Sessions</h4>
                        <p class="text-4xl font-bold text-pink-400">${data.active_sessions || 0}</p>
                    </div>
                    <div class="card p-6 rounded-3xl">
                        <h4 class="opacity-75 text-sm">Messages / Minute</h4>
                        <p class="text-4xl font-bold text-purple-400">${data.messages_per_minute || 0}</p>
                    </div>
                    <div class="card p-6 rounded-3xl">
                        <h4 class="opacity-75 text-sm">Avg Response Time</h4>
                        <p class="text-4xl font-bold text-cyan-400">${data.avg_response_time_ms || 0}ms</p>
                    </div>
                    <div class="card p-6 rounded-3xl">
                        <h4 class="opacity-75 text-sm">Archetypes</h4>
                        <p class="text-4xl font-bold text-amber-400">${data.total_archetypes_detected || 0}</p>
                    </div>
                `;

                // Update Archetypes
                const list = document.getElementById('archetype-list');
                list.innerHTML = '';
                const archetypes = data.top_archetypes || {};
                if (Object.keys(archetypes).length === 0) {
                    list.innerHTML = `<p class="opacity-50">No archetypes detected yet...</p>`;
                } else {
                    Object.entries(archetypes).forEach(([name, count]) => {
                        list.innerHTML += `
                            <div class="flex justify-between bg-black/30 p-3 rounded-2xl">
                                <span>${name.replace('_', ' ')}</span>
                                <span class="font-bold text-purple-400">${count}</span>
                            </div>
                        `;
                    });
                }
            };

            ws.onerror = (e) => console.error("WebSocket error", e);
        }

        window.onload = () => {
            connectWebSocket();
        };
    </script>
</body>
